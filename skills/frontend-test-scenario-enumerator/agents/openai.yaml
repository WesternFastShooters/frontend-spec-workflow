display_name: Frontend Test Scenario Enumerator
short_description: Expand frontend test scenarios into planning/frontend/testing/.
default_prompt: Use $frontend-test-scenario-enumerator with /frontend-spec-workflow-enumerate-tests to enumerate the current frontend testing surface into structured draft assets under planning/frontend/testing/. Treat accepted requirements and interfaces as the truth source, create traceable scenario IDs, and prepare downstream AI test authors to generate tests from scenarios instead of inferring expectations from code alone.
